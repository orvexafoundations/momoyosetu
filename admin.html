<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Edit Data</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            overflow-x: auto;
            flex: 1;
        }
        h1 { color: #0f3b5c; margin-top: 0; }
        .login-panel {
            background: #eef2ff;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        button, .btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-logout { background: #b91c1c; }
        .periode-control {
            background: #eef2ff;
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        select, input {
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            min-width: 800px;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 6px 4px;
            text-align: center;
        }
        th { background: #e2e8f0; }
        .bg-merah { background-color: #fee2e2 !important; }
        select.status-select { width: 60px; }
        .potongan-input { width: 90px; }
        .footer-nav {
            margin-top: 20px;
            background: white;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .footer-nav a {
            text-decoration: none;
            background: #1e3a8a;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 0 8px;
            display: inline-block;
            font-weight: bold;
        }
        .footer-nav a.active {
            background: #2c5f2d;
        }
        .status-badge {
            font-weight: bold;
            margin-right: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 Admin Panel - Kelola Data</h1>
    <div class="login-panel" id="loginPanel">
        <span id="statusBadge" class="status-badge">Belum login</span>
        <input type="email" id="email" placeholder="Email admin" value="admin@toko.com">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login Admin</button>
        <button id="logoutBtn" style="display:none;" class="btn-logout">Logout</button>
    </div>

    <div id="adminContent" style="display:none;">
        <div class="periode-control">
            <label>📅 Tanggal Mulai (31 hari):</label>
            <input type="date" id="tanggalMulai">
            <button id="ubahPeriodeBtn">Ubah Periode</button>
            <button id="resetBtn">Reset Semua Jadi H</button>
            <button id="contohBtn">Contoh Variasi (F)</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="absensiTable">
                <thead id="headerAbsensi"></thead>
                <tbody id="bodyAbsensi"></tbody>
            </table>
        </div>
        <div style="margin-top: 30px;">
            <h3>💰 Edit Potongan Gaji</h3>
            <table id="potonganTable">
                <thead><tr><th>No</th><th>Nama</th><th>Potongan (Rp)</th></tr></thead>
                <tbody id="bodyPotongan"></tbody>
            </table>
        </div>
    </div>
</div>
<div class="footer-nav">
    <a href="kehadiran.html">📆 Kehadiran</a>
    <a href="rekapgaji.html">💰 Rekap Gaji</a>
    <a href="slipgaji.html">🧾 Slip Gaji</a>
    <a href="admin.html" class="active">🔒 Admin</a>
</div>

<script>
    const SUPABASE_URL = 'https://vfjclzelcaanbjppgtou.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmamNsemVsY2FhbmJqcHBndG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODMwOTgsImV4cCI6MjA5Njc1OTA5OH0.TqJAkZjsYaOinKApvjHWjxbXZ9Esb0cI7K6yy_HPuMw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isAdmin = false;
    let karyawanList = [];
    let tanggalList = [];
    let absensiMap = new Map();
    let potonganMap = new Map();
    let currentStartDate = "", currentEndDate = "";

    // Auth
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return alert('Login gagal: ' + error.message);
        const { data: { user } } = await supabase.auth.getUser();
        if (user.email === 'admin@toko.com') {
            isAdmin = true;
            localStorage.setItem('adminSession', 'true');
            document.getElementById('statusBadge').innerText = '✅ Admin aktif';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        } else {
            alert('Bukan akun admin');
            await supabase.auth.signOut();
        }
    }
    async function logout() {
        await supabase.auth.signOut();
        localStorage.removeItem('adminSession');
        isAdmin = false;
        document.getElementById('statusBadge').innerText = 'Belum login';
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('adminContent').style.display = 'none';
    }
    async function checkSession() {
        if (localStorage.getItem('adminSession') === 'true') {
            const { data } = await supabase.auth.getSession();
            if (data.session && data.session.user.email === 'admin@toko.com') {
                isAdmin = true;
                document.getElementById('statusBadge').innerText = '✅ Admin aktif';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else {
                logout();
            }
        }
    }

    async function loadData() {
        let { data: periode } = await supabase.from('periode').select('*').limit(1);
        if (periode && periode[0]) {
            currentStartDate = periode[0].start_date;
            currentEndDate = periode[0].end_date;
        } else {
            currentStartDate = '2026-05-26';
            currentEndDate = '2026-06-25';
        }
        document.getElementById('tanggalMulai').value = currentStartDate;

        // Generate tanggal
        tanggalList = [];
        let start = new Date(currentStartDate);
        let end = new Date(currentEndDate);
        let hariIndo = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            let isRed = (d.getDay() === 5 || d.getDay() === 6 || d.getDay() === 0);
            tanggalList.push({
                dateStr: d.toISOString().slice(0,10),
                full: `${d.getDate()} ${hariIndo[d.getDay()]}`,
                isRed
            });
        }

        // Karyawan
        let { data: karyawan } = await supabase.from('karyawan').select('*').order('no');
        karyawanList = karyawan || [];

        // Absensi
        let { data: absensiRows } = await supabase.from('absensi').select('*').gte('tanggal', currentStartDate).lte('tanggal', currentEndDate);
        absensiMap.clear();
        for (let r of absensiRows) absensiMap.set(`${r.karyawan_id}_${r.tanggal}`, r.status);

        // Potongan
        let { data: potonganRows } = await supabase.from('potongan').select('*').eq('periode_start', currentStartDate).eq('periode_end', currentEndDate);
        potonganMap.clear();
        for (let r of potonganRows) potonganMap.set(r.karyawan_id, r.nominal);

        renderAbsensi();
        renderPotongan();
    }

    async function updateStatus(karyawanId, tanggal, newStatus) {
        if (!isAdmin) return;
        const { error } = await supabase.from('absensi').upsert({
            karyawan_id: karyawanId,
            tanggal: tanggal,
            status: newStatus
        }, { onConflict: 'karyawan_id, tanggal' });
        if (error) alert('Gagal update: ' + error.message);
        else {
            absensiMap.set(`${karyawanId}_${tanggal}`, newStatus);
            renderAbsensi();
        }
    }

    async function updatePotongan(karyawanId, nominal) {
        if (!isAdmin) return;
        const { error } = await supabase.from('potongan').upsert({
            karyawan_id: karyawanId,
            nominal: nominal,
            periode_start: currentStartDate,
            periode_end: currentEndDate
        }, { onConflict: 'karyawan_id, periode_start, periode_end' });
        if (error) alert('Gagal update potongan: ' + error.message);
        else {
            potonganMap.set(karyawanId, nominal);
            renderPotongan();
        }
    }

    function renderAbsensi() {
        const thead = document.getElementById('headerAbsensi');
        let headerRow = '<tr><th>No</th><th>Nama</th>';
        for (let t of tanggalList) {
            let redClass = t.isRed ? 'class="bg-merah"' : '';
            headerRow += `<th ${redClass}>${t.full}</th>`;
        }
        headerRow += '<th>Total H</th><th>Total I</th><th>Total S</th><th>Total A</th><th>Total F</th></tr>';
        thead.innerHTML = headerRow;

        const tbody = document.getElementById('bodyAbsensi');
        tbody.innerHTML = '';
        for (let k of karyawanList) {
            let row = document.createElement('tr');
            row.appendChild(createTd(k.no));
            row.appendChild(createTd(k.nama));
            let hitung = {H:0, I:0, S:0, A:0, F:0};
            for (let t of tanggalList) {
                let status = absensiMap.get(`${k.id}_${t.dateStr}`) || 'H';
                hitung[status]++;
                let td = document.createElement('td');
                let select = document.createElement('select');
                select.className = 'status-select';
                ['H','I','S','A','F'].forEach(opt => {
                    let op = document.createElement('option');
                    op.value = opt;
                    op.textContent = opt;
                    if (opt === status) op.selected = true;
                    select.appendChild(op);
                });
                select.onchange = (function(kid, tglStr, sel) {
                    return () => updateStatus(kid, tglStr, sel.value);
                })(k.id, t.dateStr, select);
                td.appendChild(select);
                td.style.backgroundColor = getWarna(status);
                if (t.isRed) td.classList.add('bg-merah');
                row.appendChild(td);
            }
            row.appendChild(createTd(hitung.H));
            row.appendChild(createTd(hitung.I));
            row.appendChild(createTd(hitung.S));
            row.appendChild(createTd(hitung.A));
            row.appendChild(createTd(hitung.F));
            tbody.appendChild(row);
        }
    }

    function renderPotongan() {
        const tbody = document.getElementById('bodyPotongan');
        tbody.innerHTML = '';
        for (let k of karyawanList) {
            let pot = potonganMap.get(k.id) || 0;
            let row = document.createElement('tr');
            row.appendChild(createTd(k.no));
            row.appendChild(createTd(k.nama));
            let tdPot = document.createElement('td');
            let inp = document.createElement('input');
            inp.type = 'number';
            inp.value = pot;
            inp.className = 'potongan-input';
            inp.onchange = (function(kid, input) {
                return () => updatePotongan(kid, parseInt(input.value) || 0);
            })(k.id, inp);
            tdPot.appendChild(inp);
            row.appendChild(tdPot);
            tbody.appendChild(row);
        }
    }

    async function resetAll() {
        if (!isAdmin || !confirm('Reset semua status ke H?')) return;
        for (let k of karyawanList) {
            for (let t of tanggalList) {
                await supabase.from('absensi').upsert({
                    karyawan_id: k.id,
                    tanggal: t.dateStr,
                    status: 'H'
                }, { onConflict: 'karyawan_id, tanggal' });
                absensiMap.set(`${k.id}_${t.dateStr}`, 'H');
            }
        }
        renderAbsensi();
    }

    async function contohVariasi() {
        if (!isAdmin) return;
        await resetAll();
        let contoh = [
            { karyawan_id:1, tanggal:'2026-05-29', st:'F' }, { karyawan_id:1, tanggal:'2026-06-05', st:'F' }, { karyawan_id:1, tanggal:'2026-06-10', st:'S' },
            { karyawan_id:2, tanggal:'2026-05-31', st:'A' }, { karyawan_id:2, tanggal:'2026-06-01', st:'A' },
            { karyawan_id:3, tanggal:'2026-06-03', st:'F' }, { karyawan_id:3, tanggal:'2026-06-04', st:'F' }, { karyawan_id:3, tanggal:'2026-06-15', st:'F' },
            { karyawan_id:4, tanggal:'2026-06-07', st:'I' },
            { karyawan_id:5, tanggal:'2026-06-13', st:'F' },
            { karyawan_id:6, tanggal:'2026-06-17', st:'S' },
            { karyawan_id:7, tanggal:'2026-06-20', st:'F' }, { karyawan_id:7, tanggal:'2026-06-21', st:'A' },
            { karyawan_id:8, tanggal:'2026-06-09', st:'I' },
            { karyawan_id:9, tanggal:'2026-06-24', st:'F' }, { karyawan_id:9, tanggal:'2026-06-25', st:'F' }
        ];
        for (let c of contoh) {
            await supabase.from('absensi').upsert({
                karyawan_id: c.karyawan_id,
                tanggal: c.tanggal,
                status: c.st
            }, { onConflict: 'karyawan_id, tanggal' });
            absensiMap.set(`${c.karyawan_id}_${c.tanggal}`, c.st);
        }
        renderAbsensi();
    }

    async function ubahPeriode() {
        if (!isAdmin) return;
        let newStart = document.getElementById('tanggalMulai').value;
        let newEnd = new Date(newStart);
        newEnd.setDate(newEnd.getDate() + 30);
        let endStr = newEnd.toISOString().slice(0,10);
        await supabase.from('periode').delete().neq('id', 0);
        await supabase.from('periode').insert({ start_date: newStart, end_date: endStr });
        // Buat absensi untuk periode baru (default H) untuk semua karyawan
        for (let k of karyawanList) {
            let d = new Date(newStart);
            while (d <= newEnd) {
                let tglStr = d.toISOString().slice(0,10);
                await supabase.from('absensi').upsert({
                    karyawan_id: k.id,
                    tanggal: tglStr,
                    status: 'H'
                }, { onConflict: 'karyawan_id, tanggal' });
                d.setDate(d.getDate() + 1);
            }
        }
        loadData();
    }

    function createTd(txt) { let td = document.createElement('td'); td.textContent = txt; return td; }
    function getWarna(s) {
        if(s==='H') return '#dcfce7';
        if(s==='I') return '#fef9c3';
        if(s==='S') return '#fed7aa';
        if(s==='A') return '#fecaca';
        if(s==='F') return '#d9f99d';
        return 'white';
    }

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('resetBtn').onclick = resetAll;
    document.getElementById('contohBtn').onclick = contohVariasi;
    document.getElementById('ubahPeriodeBtn').onclick = ubahPeriode;
    checkSession();
</script>
</body>
</html>
