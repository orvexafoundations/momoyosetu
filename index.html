<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Absensi & Gaji - Offline (100% Work)</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 100%; background: white; border-radius: 24px; padding: 20px; overflow-x: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0f3b5c; margin: 0 0 10px 0; }
        .login-bar { background: #eef2ff; padding: 12px 16px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .admin-badge { background: #16a34a; color: white; }
        .view-badge { background: #f97316; color: white; }
        button { background: #1e3a8a; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: bold; margin: 4px; }
        .periode-control { background: #f8fafc; padding: 12px; border-radius: 16px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; min-width: 800px; }
        th, td { border: 1px solid #cbd5e1; padding: 6px 4px; text-align: center; }
        th { background: #e2e8f0; }
        .bg-merah { background-color: #fee2e2 !important; }
        select.status-select { width: 60px; padding: 4px; border-radius: 8px; }
        .total-row { background: #f1f5f9; font-weight: bold; }
        .tab-buttons { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #1e3a8a; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        input.potongan { width: 90px; padding: 4px; border-radius: 8px; border: 1px solid #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Sistem Absensi & Penggajian (Offline - Tanpa Error)</h1>
    <div class="login-bar">
        <div><span id="roleBadge" class="badge view-badge">🔒 View Only</span></div>
        <div>
            <input type="password" id="adminPassword" placeholder="Password admin" style="padding:6px; border-radius:20px; border:1px solid #ccc;">
            <button id="loginBtn">Login Admin</button>
            <button id="logoutBtn" style="display:none;">Logout</button>
        </div>
    </div>

    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="kehadiran">📆 Kehadiran</button>
        <button class="tab-btn" data-tab="rekap">💰 Rekap Gaji</button>
        <button class="tab-btn" data-tab="slip">🧾 Slip Gaji</button>
        <button class="tab-btn" data-tab="admin">🔒 Admin (Edit)</button>
    </div>

    <div id="kehadiran" class="tab-pane active"></div>
    <div id="rekap" class="tab-pane"></div>
    <div id="slip" class="tab-pane"></div>
    <div id="admin" class="tab-pane"></div>
</div>

<script>
    // ======================= DATA KARYAWAN =======================
    const karyawan = [
        { id:1, no:1, nama:"Aya", jabatan:"Kepala Toko", gapok:2300000, tunjangan:300000 },
        { id:2, no:2, nama:"Amelia", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:3, no:3, nama:"Diana", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:4, no:4, nama:"Aris", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:5, no:5, nama:"Dinay", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:6, no:6, nama:"Rado", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:7, no:7, nama:"Sindy", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:8, no:8, nama:"Ismi", jabatan:"Karyawan", gapok:2300000, tunjangan:0 },
        { id:9, no:9, nama:"Hakim", jabatan:"Karyawan", gapok:2300000, tunjangan:0 }
    ];

    let tanggalList = [];
    let absensi = {};
    let potongan = {};
    let isAdmin = false;
    let currentStartDate = "2026-05-26";
    let currentEndDate = "2026-06-25";

    function generateTanggalList() {
        let list = [];
        let start = new Date(currentStartDate);
        let end = new Date(currentEndDate);
        let hari = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
            let isRed = (d.getDay()===5 || d.getDay()===6 || d.getDay()===0);
            list.push({
                dateStr: d.toISOString().slice(0,10),
                full: `${d.getDate()} ${hari[d.getDay()]}`,
                isRed
            });
        }
        return list;
    }

    function saveData() {
        localStorage.setItem('absensi_data', JSON.stringify(absensi));
        localStorage.setItem('potongan_data', JSON.stringify(potongan));
        localStorage.setItem('start_date', currentStartDate);
        localStorage.setItem('end_date', currentEndDate);
    }

    function loadData() {
        let savedStart = localStorage.getItem('start_date');
        let savedEnd = localStorage.getItem('end_date');
        if (savedStart && savedEnd) {
            currentStartDate = savedStart;
            currentEndDate = savedEnd;
        }
        tanggalList = generateTanggalList();

        let savedAbsensi = localStorage.getItem('absensi_data');
        if (savedAbsensi) {
            absensi = JSON.parse(savedAbsensi);
        } else {
            absensi = {};
            for (let k of karyawan) {
                for (let t of tanggalList) {
                    absensi[`${k.id}_${t.dateStr}`] = 'H';
                }
            }
        }
        let savedPot = localStorage.getItem('potongan_data');
        if (savedPot) {
            potongan = JSON.parse(savedPot);
        } else {
            potongan = {};
            for (let k of karyawan) potongan[k.id] = 0;
        }
    }

    function renderAll() {
        renderKehadiran();
        renderRekap();
        renderSlip();
        if (isAdmin) renderAdmin();
    }

    function renderKehadiran() {
        let html = '<table><thead><tr><th>No</th><th>Nama</th>';
        for (let t of tanggalList) {
            let cls = t.isRed ? 'class="bg-merah"' : '';
            html += `<th ${cls}>${t.full}</th>`;
        }
        html += '<th>Total H</th><th>Total I</th><th>Total S</th><th>Total A</th><th>Total F</th></tr></thead><tbody>';
        for (let k of karyawan) {
            let hitung = {H:0,I:0,S:0,A:0,F:0};
            html += `<tr><td>${k.no}</td><td>${k.nama}</td>`;
            for (let t of tanggalList) {
                let st = absensi[`${k.id}_${t.dateStr}`] || 'H';
                hitung[st]++;
                let warna = {H:'#dcfce7',I:'#fef9c3',S:'#fed7aa',A:'#fecaca',F:'#d9f99d'}[st];
                html += `<td style="background:${warna}">${st}</td>`;
            }
            html += `<td>${hitung.H}</td><td>${hitung.I}</td><td>${hitung.S}</td><td>${hitung.A}</td><td>${hitung.F}</td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('kehadiran').innerHTML = html;
    }

    function renderRekap() {
        let html = '<table><thead><tr><th>No</th><th>Nama</th><th>Jabatan</th><th>Total H</th><th>Total A</th><th>Hari F</th><th>Jam Lembur</th><th>Upah Lembur</th><th>Gaji Pokok</th><th>Tunjangan</th><th>Potongan</th><th>Total Gaji</th></tr></thead><tbody>';
        let totalAll = 0;
        for (let k of karyawan) {
            let hadir=0,alpha=0,jmlF=0;
            for (let t of tanggalList) {
                let st = absensi[`${k.id}_${t.dateStr}`] || 'H';
                if (st==='H') hadir++;
                if (st==='A') alpha++;
                if (st==='F') jmlF++;
            }
            let jam = jmlF * 8;
            let upah = jam * 10000;
            let total = k.gapok + upah + k.tunjangan - (potongan[k.id]||0);
            totalAll += total;
            html += `<tr><td>${k.no}</td><td>${k.nama}</td><td>${k.jabatan}</td><td>${hadir}</td><td>${alpha}</td><td>${jmlF}</td><td>${jam}</td><td>Rp${upah.toLocaleString()}</td><td>Rp${k.gapok.toLocaleString()}</td><td>Rp${k.tunjangan.toLocaleString()}</td><td>Rp${(potongan[k.id]||0).toLocaleString()}</td><td>Rp${total.toLocaleString()}</td></tr>`;
        }
        html += `<tr class="total-row"><td colspan="11">TOTAL</td><td>Rp${totalAll.toLocaleString()}</td></tr></tbody></table>`;
        document.getElementById('rekap').innerHTML = html;
    }

    function renderSlip() {
        let html = '<table><thead><tr><th>No</th><th>Nama</th><th>Jabatan</th><th>Total H</th><th>Gaji Pokok</th><th>Tunjangan</th><th>Jam Lembur</th><th>Upah Lembur</th><th>Potongan</th><th>Total Gaji</th></tr></thead><tbody>';
        let totalAll = 0;
        for (let k of karyawan) {
            let hadir=0,jmlF=0;
            for (let t of tanggalList) {
                let st = absensi[`${k.id}_${t.dateStr}`] || 'H';
                if (st==='H') hadir++;
                if (st==='F') jmlF++;
            }
            let jam = jmlF * 8;
            let upah = jam * 10000;
            let total = k.gapok + upah + k.tunjangan - (potongan[k.id]||0);
            totalAll += total;
            html += `<tr><td>${k.no}</td><td>${k.nama}</td><td>${k.jabatan}</td><td>${hadir}</td><td>Rp${k.gapok.toLocaleString()}</td><td>Rp${k.tunjangan.toLocaleString()}</td><td>${jam}</td><td>Rp${upah.toLocaleString()}</td><td>Rp${(potongan[k.id]||0).toLocaleString()}</td><td>Rp${total.toLocaleString()}</td></tr>`;
        }
        html += `<tr class="total-row"><td colspan="9">TOTAL</td><td>Rp${totalAll.toLocaleString()}</td></tr></tbody></table>`;
        document.getElementById('slip').innerHTML = html;
    }

    function renderAdmin() {
        let html = `<div class="periode-control">
            <label>Tanggal Mulai:</label>
            <input type="date" id="tanggalMulaiAdmin" value="${currentStartDate}">
            <button id="ubahPeriodeBtn">Ubah Periode</button>
            <button id="resetBtn">Reset Semua Jadi H</button>
            <button id="contohBtn">Contoh Variasi</button>
        </div>
        <h3>Edit Absensi</h3>
        <table><thead><tr><th>No</th><th>Nama</th>`;
        for (let t of tanggalList) {
            let cls = t.isRed ? 'class="bg-merah"' : '';
            html += `<th ${cls}>${t.full}</th>`;
        }
        html += '<th>Total H</th><th>Total I</th><th>Total S</th><th>Total A</th><th>Total F</th></tr></thead><tbody>';
        for (let k of karyawan) {
            let hitung = {H:0,I:0,S:0,A:0,F:0};
            html += `<tr><td>${k.no}</td><td>${k.nama}</td>`;
            for (let t of tanggalList) {
                let st = absensi[`${k.id}_${t.dateStr}`] || 'H';
                hitung[st]++;
                let warna = {H:'#dcfce7',I:'#fef9c3',S:'#fed7aa',A:'#fecaca',F:'#d9f99d'}[st];
                html += `<td style="background:${warna}">
                    <select class="status-select" data-karyawan="${k.id}" data-tanggal="${t.dateStr}">
                        ${['H','I','S','A','F'].map(opt => `<option ${opt===st?'selected':''} value="${opt}">${opt}</option>`).join('')}
                    </select>
                </td>`;
            }
            html += `<td>${hitung.H}</td><td>${hitung.I}</td><td>${hitung.S}</td><td>${hitung.A}</td><td>${hitung.F}</td></tr>`;
        }
        html += '</tbody></table><h3>Edit Potongan</h3><table><thead><tr><th>No</th><th>Nama</th><th>Potongan (Rp)</th></tr></thead><tbody>';
        for (let k of karyawan) {
            html += `<tr><td>${k.no}</td><td>${k.nama}</td><td><input type="number" class="potongan-input" data-karyawan="${k.id}" value="${potongan[k.id]||0}"></td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('admin').innerHTML = html;

        // Event listeners untuk dropdown
        document.querySelectorAll('.status-select').forEach(sel => {
            sel.addEventListener('change', async (e) => {
                if (!isAdmin) return;
                let karyawanId = parseInt(sel.dataset.karyawan);
                let tanggal = sel.dataset.tanggal;
                let newStatus = sel.value;
                absensi[`${karyawanId}_${tanggal}`] = newStatus;
                saveData();
                renderAll();
            });
        });
        document.querySelectorAll('.potongan-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                if (!isAdmin) return;
                let kid = parseInt(inp.dataset.karyawan);
                potongan[kid] = parseInt(inp.value) || 0;
                saveData();
                renderAll();
            });
        });
        document.getElementById('ubahPeriodeBtn').onclick = () => {
            if (!isAdmin) return;
            let newStart = document.getElementById('tanggalMulaiAdmin').value;
            let newEnd = new Date(newStart);
            newEnd.setDate(newEnd.getDate()+30);
            currentStartDate = newStart;
            currentEndDate = newEnd.toISOString().slice(0,10);
            tanggalList = generateTanggalList();
            // reset absensi untuk tanggal baru (default H)
            for (let k of karyawan) {
                for (let t of tanggalList) {
                    let key = `${k.id}_${t.dateStr}`;
                    if (!absensi[key]) absensi[key] = 'H';
                }
            }
            saveData();
            renderAll();
        };
        document.getElementById('resetBtn').onclick = () => {
            if (!isAdmin || !confirm('Reset semua ke H?')) return;
            for (let k of karyawan) {
                for (let t of tanggalList) {
                    absensi[`${k.id}_${t.dateStr}`] = 'H';
                }
            }
            saveData();
            renderAll();
        };
        document.getElementById('contohBtn').onclick = () => {
            if (!isAdmin) return;
            for (let k of karyawan) {
                for (let t of tanggalList) {
                    absensi[`${k.id}_${t.dateStr}`] = 'H';
                }
            }
            let contoh = [
                { id:1, tgl:'2026-05-29', st:'F' },{ id:1, tgl:'2026-06-05', st:'F' },{ id:1, tgl:'2026-06-10', st:'S' },
                { id:2, tgl:'2026-05-31', st:'A' },{ id:2, tgl:'2026-06-01', st:'A' },
                { id:3, tgl:'2026-06-03', st:'F' },{ id:3, tgl:'2026-06-04', st:'F' },{ id:3, tgl:'2026-06-15', st:'F' },
                { id:4, tgl:'2026-06-07', st:'I' },{ id:5, tgl:'2026-06-13', st:'F' },{ id:6, tgl:'2026-06-17', st:'S' },
                { id:7, tgl:'2026-06-20', st:'F' },{ id:7, tgl:'2026-06-21', st:'A' },{ id:8, tgl:'2026-06-09', st:'I' },
                { id:9, tgl:'2026-06-24', st:'F' },{ id:9, tgl:'2026-06-25', st:'F' }
            ];
            for (let c of contoh) {
                absensi[`${c.id}_${c.tgl}`] = c.st;
            }
            saveData();
            renderAll();
        };
    }

    // Login & Tab
    function login() {
        let pwd = document.getElementById('adminPassword').value;
        if (pwd === 'aya123') {
            isAdmin = true;
            localStorage.setItem('isAdmin', 'true');
            document.getElementById('roleBadge').innerHTML = '👑 Admin';
            document.getElementById('roleBadge').className = 'badge admin-badge';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            renderAll();
        } else alert('Password salah!');
    }
    function logout() {
        isAdmin = false;
        localStorage.removeItem('isAdmin');
        document.getElementById('roleBadge').innerHTML = '🔒 View Only';
        document.getElementById('roleBadge').className = 'badge view-badge';
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        renderAll();
    }
    function checkSession() {
        if (localStorage.getItem('isAdmin') === 'true') {
            isAdmin = true;
            document.getElementById('roleBadge').innerHTML = '👑 Admin';
            document.getElementById('roleBadge').className = 'badge admin-badge';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } else {
            isAdmin = false;
        }
    }
    function initTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                let tabId = btn.getAttribute('data-tab');
                panes.forEach(p => p.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tabId === 'admin') renderAdmin();
            });
        });
    }
    loadData();
    checkSession();
    renderAll();
    initTabs();
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('logoutBtn').onclick = logout;
</script>
</body>
</html>
