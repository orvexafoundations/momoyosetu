<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Gaji - Publik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            overflow-x: auto;
            flex: 1;
        }
        h1 { color: #0f3b5c; margin-top: 0; }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
            min-width: 700px;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 8px 6px;
            text-align: center;
        }
        th { background: #e2e8f0; }
        .total-row { background: #f1f5f9; font-weight: bold; }
        .footer-nav {
            margin-top: 20px;
            background: white;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .footer-nav a {
            text-decoration: none;
            background: #1e3a8a;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 0 8px;
            display: inline-block;
            font-weight: bold;
        }
        .footer-nav a.active {
            background: #2c5f2d;
        }
        .loading { text-align: center; padding: 20px; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Rekap Gaji Karyawan</h1>
    <div id="loading" class="loading">Memuat data...</div>
    <div style="overflow-x: auto;">
        <table id="rekapTable">
            <thead>
                <tr><th>No</th><th>Nama</th><th>Jabatan</th><th>Total Hadir</th><th>Total Alpha</th><th>Hari F</th><th>Jam Lembur</th><th>Upah Lembur</th><th>Gaji Pokok</th><th>Tunjangan</th><th>Potongan</th><th>Total Gaji</th></tr>
            </thead>
            <tbody id="bodyRekap"></tbody>
            <tfoot id="footerRekap"></tfoot>
        </table>
    </div>
</div>
<div class="footer-nav">
    <a href="kehadiran.html">📆 Kehadiran</a>
    <a href="rekapgaji.html" class="active">💰 Rekap Gaji</a>
    <a href="slipgaji.html">🧾 Slip Gaji</a>
    <a href="admin.html">🔒 Admin</a>
</div>
<script>
    const SUPABASE_URL = 'https://vfjclzelcaanbjppgtou.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmamNsemVsY2FhbmJqcHBndG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODMwOTgsImV4cCI6MjA5Njc1OTA5OH0.TqJAkZjsYaOinKApvjHWjxbXZ9Esb0cI7K6yy_HPuMw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadData() {
        let { data: periode } = await supabase.from('periode').select('*').limit(1);
        let start = periode?.[0]?.start_date || '2026-05-26';
        let end = periode?.[0]?.end_date || '2026-06-25';

        let { data: karyawan } = await supabase.from('karyawan').select('*').order('no');
        if (!karyawan) {
            document.getElementById('loading').innerHTML = 'Data karyawan tidak ditemukan.';
            return;
        }

        let { data: absensiRows } = await supabase.from('absensi').select('*').gte('tanggal', start).lte('tanggal', end);
        let absensiMap = new Map();
        for (let r of absensiRows) absensiMap.set(`${r.karyawan_id}_${r.tanggal}`, r.status);

        let { data: potonganRows } = await supabase.from('potongan').select('*').eq('periode_start', start).eq('periode_end', end);
        let potonganMap = new Map();
        for (let r of potonganRows) potonganMap.set(r.karyawan_id, r.nominal);

        let tanggalList = [];
        for (let d = new Date(start); d <= new Date(end); d.setDate(d.getDate()+1)) {
            tanggalList.push(d.toISOString().slice(0,10));
        }

        const tbody = document.getElementById('bodyRekap');
        tbody.innerHTML = '';
        let totalGapok=0, totalUpah=0, totalTunj=0, totalPot=0, totalAll=0;

        for (let k of karyawan) {
            let hadir=0, alpha=0, jmlF=0;
            for (let t of tanggalList) {
                let st = absensiMap.get(`${k.id}_${t}`) || 'H';
                if (st==='H') hadir++;
                if (st==='A') alpha++;
                if (st==='F') jmlF++;
            }
            let jam = jmlF * 8;
            let upah = jam * 10000;
            let total = k.gapok + upah + (k.tunjangan||0) - (potonganMap.get(k.id)||0);
            totalGapok += k.gapok;
            totalUpah += upah;
            totalTunj += (k.tunjangan||0);
            totalPot += (potonganMap.get(k.id)||0);
            totalAll += total;

            let row = `<tr>
                <td>${k.no}</td><td>${k.nama}</td><td>${k.jabatan}</td>
                <td>${hadir}</td><td>${alpha}</td><td>${jmlF}</td><td>${jam}</td>
                <td>Rp${upah.toLocaleString()}</td><td>Rp${k.gapok.toLocaleString()}</td>
                <td>Rp${(k.tunjangan||0).toLocaleString()}</td>
                <td>Rp${(potonganMap.get(k.id)||0).toLocaleString()}</td>
                <td>Rp${total.toLocaleString()}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        document.getElementById('footerRekap').innerHTML = `<tr class="total-row">
            <td colspan="5">TOTAL</td>
            <td>${karyawan.reduce((a,_,i)=> a + (tanggalList.filter(t=>absensiMap.get(`${karyawan[i].id}_${t}`)==='F').length),0)}</td>
            <td>${karyawan.reduce((a,_,i)=> a + (tanggalList.filter(t=>absensiMap.get(`${karyawan[i].id}_${t}`)==='F').length*8),0)}</td>
            <td>Rp${totalUpah.toLocaleString()}</td>
            <td>Rp${totalGapok.toLocaleString()}</td>
            <td>Rp${totalTunj.toLocaleString()}</td>
            <td>Rp${totalPot.toLocaleString()}</td>
            <td>Rp${totalAll.toLocaleString()}</td>
        </tr>`;
        document.getElementById('loading').style.display = 'none';
    }
    loadData();
</script>
</body>
</html>
